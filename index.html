<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divi Love Scan — Divi Blockchain Explorer</title>
    <meta name="description" content="Explore the Divi blockchain: blocks, transactions, addresses, staking rewards and lottery winners." />

    <!-- The 64px icon is the favicon proper; 256px covers home-screen and
         high-DPI use. Both are WebP, which every current browser handles - an
         older one simply falls back to no icon rather than a broken one. -->
    <link rel="icon" type="image/webp" sizes="64x64" href="/favicon-64.webp" />
    <link rel="icon" type="image/webp" sizes="256x256" href="/icon-256.webp" />
    <link rel="apple-touch-icon" href="/icon-256.webp" />
    <meta name="theme-color" content="#8b5cf6" />

    <!-- Link previews, so a shared scan.divi.love URL carries the mark. -->
    <meta property="og:title" content="Divi Love Scan" />
    <meta property="og:description" content="Explore the Divi blockchain: blocks, transactions, addresses, staking rewards and lottery winners." />
    <meta property="og:image" content="/icon-256.webp" />
    <meta name="twitter:card" content="summary" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
